<h1>Tv</h1>

<link href="styles.css" rel="stylesheet">
<p>Character art and gifs! Only ones from my visual novels. <br>
Cgs and out-of-game artwork</p>

<style>
    body {
        background-color: rgba(0, 4, 255, 0.534);
        background-image: url(https://media1.tenor.com/m/fHQvaaO_jq8AAAAC/snow-room-cold.gif);

        background-size: cover;

        text-align: center;
    }


    #next {
        background-color: yellow;
        color: rgba(255, 255, 0, 0);

        border: 5px solid black;

        font-size: 20px;
        padding: 5px;
    }
    #next:hover {
        background-color: rgb(0, 0, 0);

        border: 3px solid black;
    }

    .tv {

        position: relative;

        top:0;
        left:0;
        right:0;
        bottom:0;

    }

    .overlay {

        position:absolute;
        inset: 0;

        object-fit: cover;
        opacity: 100%;

        mix-blend-mode: overlay;

    }

    #screen {

        position: flex;

        justify-content: center;
        justify-items: center;
    }
    

</style>



<div class="tv">
    <div id="screen">
    <img src="https://media1.tenor.com/m/sd0VnIUAP6cAAAAC/2.gif" id="currentchannel" width="1000" height="500">

    <div class="overlay">
        <img src="https://media1.tenor.com/m/88dnH_mHRLAAAAAC/static-tv-static.gif" width="1000" height="500">
    </div>
    </div>
    

</div>

<div class="controls">
        <button id="next" onclick="changechannel();">Next</button>
    </div>



<script>

    var audio = new Audio("audio/channelsfx (mp3cut.net).mp3")

    function changechannel(){

        audio.play()

        mainchannel = ["drawings/forrest face design.png", "drawings/old forrest 2.png", "drawings/old forrest.png", "images/forrestgif.gif", "images/razzgif.gif", "../drawings/forrestdoodle.png"];

        let img = document.getElementById("currentchannel");

        var min = 0;
        var max = 5;

        var number = Math.floor(Math.random() * (max - min + 1) + min);

        img.src = mainchannel[number];
        
    }

</script>
