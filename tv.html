<div class="tv">

    <div class="controls">
        <button id="next" onclick="changechannel();">Next</button>
    </div>

<script>

    var audio = new Audio("audio/channelsfx (mp3cut.net).mp3")

    function changechannel(){

        audio.play()

        mainchannel = ["drawings/forrest face design.png", "drawings/old forrest 2.png", "drawings/old forrest.png", "images/forrestgif.gif", "images/razzgif.gif"];

        let img = document.getElementById("currentchannel");

        var min = 0;
        var max = 4;

        var number = Math.floor(Math.random() * (max - min + 1) + min);

        img.src = mainchannel[number];
        
    }

</script>
